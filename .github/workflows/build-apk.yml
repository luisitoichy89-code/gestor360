name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Setup Android SDK
        run: |
          sudo apt update
          sudo apt install -y build-essential git zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev wget zip openjdk-17-jdk
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          pip install buildozer cython
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore gestor360.keystore -alias gestor360 -keyalg RSA -keysize 2048 -validity 10000 -storepass Gestor3602026 -keypass Gestor3602026 -dname "CN=Luisito, OU=Gestor360, O=Gestor360, L=LaHabana, ST=LaHabana, C=CU"
      - name: Accept Android Licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
      - name: Build APK Release
        run: buildozer android release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gestor360-APK-Release
          path: bin/*.apk
